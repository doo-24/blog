baseURL: "https://doo-24.github.io/blog/"
languageCode: "ko"
title: "개발 노트"
theme: "PaperMod"
disablePathToLower: true

# 한 페이지에 보여줄 글 수
paginate: 10

# 검색 기능 활성화
outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  # 기본 설정
  env: production
  description: "개발 공부 기록"
  author: "doo-24"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: true

  # 홈 화면 설정 (profileMode로 변경)
  profileMode:
    enabled: true
    title: "개발 노트"
    subtitle: "서버 엔지니어링 학습 기록 — 107편의 개념 정리"
    buttons:
      - name: "로드맵"
        url: /blog/posts/server-engineering/00-roadmap/
      - name: "시리즈"
        url: /blog/series/

  # 소셜 링크
  socialIcons:
    - name: github
      url: "https://github.com/doo-24"

  # 검색 설정
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

# 마크다운 렌더링 설정
markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    noBackground: true
    style: monokai
  goldmark:
    renderer:
      unsafe: true

# 메뉴
menu:
  main:
    - identifier: roadmap
      name: "로드맵"
      url: /posts/server-engineering/00-roadmap/
      weight: 1
    - identifier: search
      name: "검색"
      url: /search/
      weight: 2
    - identifier: series
      name: "시리즈"
      url: /series/
      weight: 3
    - identifier: tags
      name: "태그"
      url: /tags/
      weight: 4
    - identifier: archives
      name: "아카이브"
      url: /archives/
      weight: 5

# 분류 체계
taxonomies:
  tag: tags
  series: series
